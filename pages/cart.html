<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – ToyStore</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css"/>
</head>
<body>
<div id="navbar-placeholder" data-depth="../"></div>
<div class="page">
  <h1>🛒 Your Cart</h1>
  <div id="cart-items"></div>
  <div class="cart-summary" id="cart-summary" style="display:none">
    <h2>Order Summary</h2>
    <p>Subtotal: <strong id="subtotal">Rs 0</strong></p>
    <p>Delivery: <strong>Rs 200</strong></p>
    <p>Total: <strong id="total">Rs 0</strong></p>
    <button onclick="checkout()" style="width:100%;margin-top:12px;">Proceed to Checkout</button>
    <a href="products.html" class="link-button" style="width:100%;text-align:center;margin-top:10px;display:block;">Continue Shopping</a>
  </div>
  <div id="empty-cart" style="text-align:center;padding:60px 0;">
    <div style="font-size:4rem">🛒</div>
    <h2>Your cart is empty</h2>
    <a href="products.html" class="link-button">Start Shopping</a>
  </div>
</div>
<footer>
  <div class="footer-container">
    <div><h1>🧸 ToyStore</h1><p>Pakistan's favourite toy shop.</p></div>
    <div><h2>Links</h2><a href="products.html">Shop</a><a href="contact.html">Contact</a></div>
  </div>
  <p style="text-align:center;margin-top:16px;">© 2025 ToyStore. All rights reserved.</p>
</footer>
<script src="../jsFile/jsFunctions.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const container = document.getElementById("cart-items");
  const emptyDiv = document.getElementById("empty-cart");
  const summaryDiv = document.getElementById("cart-summary");
  container.innerHTML = "";
  if (!cart.length) { emptyDiv.style.display="block"; summaryDiv.style.display="none"; return; }
  emptyDiv.style.display="none"; summaryDiv.style.display="block";
  let sub = 0;
  cart.forEach(item => {
    sub += item.price * item.qty;
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${item.img}" alt="${item.name}"/>
      <div style="flex:1">
        <h3>${item.name}</h3>
        <p>Rs ${item.price.toLocaleString()} each</p>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <button onclick="changeQty('${item.id}',-1)">−</button>
          <span style="min-width:28px;text-align:center;font-weight:700">${item.qty}</span>
          <button onclick="changeQty('${item.id}',1)">+</button>
          <button onclick="removeFromCart('${item.id}');renderCart();" style="background:#e74c3c;margin-left:8px;">Remove</button>
        </div>
      </div>
      <div style="font-weight:700;font-size:1.1rem;color:var(--brand-primary-color)">Rs ${(item.price*item.qty).toLocaleString()}</div>
    `;
    container.appendChild(div);
  });
  document.getElementById("subtotal").textContent = "Rs " + sub.toLocaleString();
  document.getElementById("total").textContent    = "Rs " + (sub + 200).toLocaleString();
}
function changeQty(id, delta) {
  const cart = getCart();
  const idx  = cart.findIndex(c => c.id === id);
  if (idx < 0) return;
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  saveCart(cart); renderCart(); updateCartBadge();
}
function checkout() {
  alert("Order placed! Thank you for shopping at ToyStore 🧸");
  saveCart([]); renderCart(); updateCartBadge();
}
document.addEventListener("DOMContentLoaded", renderCart);
</script>
</body>
</html>
